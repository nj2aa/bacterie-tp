apiVersion: v1
kind: Pod
metadata:
  name: hypertrophie
  labels:
    app: hypertrophie
spec:
  containers:
  - name: hypertrophie
    image: bacterie-tp-hypertrophie:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 50052
    - containerPort: 8002
---
apiVersion: v1
kind: Service
metadata:
  name: hypertrophie
spec:
  selector:
    app: hypertrophie
  ports:
  - name: grpc
    port: 50052
    targetPort: 50052
  - name: metrics
    port: 8002
    targetPort: 8002
